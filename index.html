<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钢琴块红球</title>
    <link rel="stylesheet" href="css/style.css"> <!-- 引入样式文件 -->
</head>
<body>
    <!-- 倒计时计时器 -->
    <div class="timer" id="timer"></div>
    <!-- 得分显示区域 -->
    <div class="score">得分：<span id="score">0</span></div>
    <!-- 游戏主容器（Canvas） -->
    <canvas class="game-box" id="box"></canvas>

    <!-- 开始菜单 -->
    <div class="start-menu" id="start-menu">
        <div class="start-menu-content">
            <h1>试试你的手速！</h1>
            <button id="start-btn">开始游戏</button>
            <button id="settings-btn">设置</button>
        </div>
    </div>

    <!-- 设置页面 -->
    <div class="settings-menu" id="settings-menu">
        <div class="settings-menu-content">
            <h1>设置</h1>
            <div class="settings-item">
                <label for="game-time">游戏时间：</label>
                <input type="number" id="game-time" min="1" max="60" value="20">
                <span>秒</span>
            </div>
            <div class="settings-item">
                <label for="ball-speed">下落速度：</label>
                <input type="number" id="ball-speed" min="0.01" max="2" step="0.01" value="0.01">
                <span class="speed-hint" id="speed-hint">
                    <span class="hint-icon" title="慢速（动画平滑）: < 0.5
中速: 0.5-1.0
快速（无动画）: ≥ 1.0">?</span>
                </span>
            </div>
            <button id="back-from-settings-btn">返回开始菜单</button>
        </div>
    </div>

    <!-- 游戏结束遮罩 -->
    <div class="mask" id="mask"></div>

    <!-- 游戏结束弹窗 -->
    <div class="game-over" id="over">
        游戏结束<br>
        最终得分：<span id="final"></span><br>
        CPS：<span id="cps"></span><br>
        击败全网98%玩家<br>
        <button id="restart-btn">重新开始</button>
        <button id="back-to-menu-btn">返回开始菜单</button>
    </div>

    <!-- 游戏主逻辑（模块化引入） -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
